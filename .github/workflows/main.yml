name: Krypton Release Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.6.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: true

# Required so the create-release job (softprops/action-gh-release) is allowed to
# publish a release. Without this, GITHUB_TOKEN defaults to read-only on many repos
# and release creation fails with a 403 permission error.
permissions:
  contents: write

jobs:
  build-windows:
    # Cross-compiled FROM Linux using the project's own `depends` system + mingw-w64.
    # `depends` builds Qt 5.9.7 STATICALLY, so krypton-qt.exe is a single
    # self-contained file with no DLLs to ship. Building Qt takes a while
    # (expect this job to run 60-90 minutes).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils curl git ca-certificates python3 nsis \
            g++-mingw-w64-x86-64 mingw-w64-x86-64-dev
          # Ubuntu's mingw-w64 defaults to the win32 threading model, which lacks
          # std::thread support that this codebase needs. Switch to posix threads.
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Build dependencies (depends system, includes BDB 4.8, Qt 5.9.7, protobuf, qrencode)
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Build Windows binaries (daemon, CLI and GUI)
        run: |
          ./autogen.sh
          # -DNOMINMAX globally: stop <windows.h> from defining min/max macros that
          # break std::numeric_limits<...>::max() wherever include order lets
          # windows.h in before a local NOMINMAX define.
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            CPPFLAGS="-DNOMINMAX" \
            --disable-tests --disable-bench --prefix=/
          make -j$(nproc)

      - name: Build Windows installer (NSIS setup wizard)
        run: |
          # `make deploy` is the codebase's own installer target: it strips the five
          # binaries into release/ and runs makensis on share/setup.nsi, producing a
          # standard install wizard (install dir choice, Start Menu shortcuts,
          # registered uninstaller) at the repo root.
          make deploy
          ls -la krypton-*-setup.exe

      - name: Package Windows binaries
        run: |
          OUT="krypton-${{ inputs.version }}-win64"
          mkdir -p "$OUT"
          cp src/kryptond.exe src/krypton-cli.exe src/krypton-tx.exe "$OUT"/
          cp src/qt/krypton-qt.exe "$OUT"/
          cp README.md COPYING "$OUT"/
          zip -r "${OUT}.zip" "$OUT"
          # Normalize the installer name to include the requested release version
          # (configure derives its own version; keep the artifact name consistent).
          mv krypton-*-setup.exe "krypton-${{ inputs.version }}-win64-setup.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            krypton-${{ inputs.version }}-win64.zip
            krypton-${{ inputs.version }}-win64-setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils curl git libboost-all-dev libssl-dev \
            libevent-dev libminiupnpc-dev libzmq3-dev libprotobuf-dev protobuf-compiler \
            qtbase5-dev qttools5-dev qttools5-dev-tools libqrencode-dev

      - name: Build Berkeley DB 4.8
        run: |
          # Ubuntu's own libdb++-dev package is v5.3+, which produces wallets that are
          # not guaranteed compatible with the 4.8 wallets built for Windows/macOS.
          # Build the exact version from source, replicating ALL the fixes that the
          # project's own `depends` system applies to this package (depends/packages/bdb.mk):
          #   1. download with a fallback mirror + checksum (download.oracle.com is
          #      notoriously unreliable for scripted/CI downloads)
          #   2. rename __atomic_compare_exchange/atomic_init, which collide with
          #      built-in functions of modern GCC/clang and break the build
          #   3. replace BDB's ancient bundled config.guess/config.sub (they misdetect
          #      modern platforms)
          BDB_SHA256="12edc0df75bf9abd7f82f821795bcee50f42cb2e5f76a6a281b85732798364ef"
          curl -fL -o db-4.8.30.NC.tar.gz http://download.oracle.com/berkeley-db/db-4.8.30.NC.tar.gz \
            || curl -fL -o db-4.8.30.NC.tar.gz https://bitcoincore.org/depends-sources/db-4.8.30.NC.tar.gz
          echo "${BDB_SHA256}  db-4.8.30.NC.tar.gz" | sha256sum -c -
          tar -xzf db-4.8.30.NC.tar.gz
          cd db-4.8.30.NC
          sed -i.old 's/__atomic_compare_exchange/__atomic_compare_exchange_db/' dbinc/atomic.h
          sed -i.old 's/atomic_init/atomic_init_db/' dbinc/atomic.h mp/mp_region.c mp/mp_mvcc.c mp/mp_fget.c mutex/mut_method.c mutex/mut_tas.c
          cp -f ../depends/config.guess ../depends/config.sub dist/
          cd build_unix
          ../dist/configure --enable-cxx --disable-shared --with-pic --prefix=/usr/local/bdb4.8
          make -j$(nproc)
          sudo make install

      - name: Build Linux 64-bit (daemon, CLI and GUI)
        run: |
          ./autogen.sh
          ./configure LDFLAGS="-L/usr/local/bdb4.8/lib" CPPFLAGS="-I/usr/local/bdb4.8/include" \
            --disable-tests --disable-bench --without-miniupnpc
          make -j$(nproc)

      - name: Package Linux binaries
        run: |
          OUT="krypton-${{ inputs.version }}-x86_64-linux-gnu"
          mkdir -p "$OUT"
          cp src/kryptond src/krypton-cli src/krypton-tx "$OUT"/
          cp src/qt/krypton-qt "$OUT"/
          cp README.md COPYING "$OUT"/
          tar -czf "${OUT}.tar.gz" "$OUT"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: krypton-${{ inputs.version }}-x86_64-linux-gnu.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          # GitHub's macOS runners ship with extra pre-installed Homebrew taps
          # (e.g. aws/tap) that Homebrew's new tap-trust policy refuses, which can
          # make any `brew` command fail. Untap them: we only need core formulae.
          brew untap aws/tap 2>/dev/null || true
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          # qt@5 (5.15): same major Qt as the Linux build, source-compatibility with
          #   this codebase is proven.
          # protobuf@21: the last protobuf line that supports C++11. Current protobuf
          #   (v27+, abseil-based) requires C++17 and a different generated-code API,
          #   which breaks this -std=c++11 codebase.
          # NOTE: boost deliberately NOT installed from brew -- see next step.
          brew install automake libtool miniupnpc openssl@3 pkg-config zmq libevent \
            qt@5 protobuf@21 qrencode

      - name: Build Boost 1.83 from source
        run: |
          # Two reasons not to use brew's boost:
          #  1. This 2018-era configure script does not know Homebrew's Apple
          #     Silicon prefix (/opt/homebrew), so it simply fails to find boost.
          #  2. brew ships boost 1.89, never tested against this codebase. 1.83 is
          #     the exact version the (fully succeeding) Linux job builds with, so
          #     compatibility is already proven.
          curl -fL -o boost_1_83_0.tar.gz https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.gz \
            || curl -fL -o boost_1_83_0.tar.gz https://boostorg.jfrog.io/artifactory/main/release/1.83.0/source/boost_1_83_0.tar.gz
          tar -xzf boost_1_83_0.tar.gz
          cd boost_1_83_0
          ./bootstrap.sh --with-libraries=system,filesystem,thread,chrono,atomic
          sudo ./b2 -j$(sysctl -n hw.ncpu) link=static cxxflags="-std=c++11" \
            --prefix=/usr/local/boost183 install > /dev/null

      - name: Build Berkeley DB 4.8
        run: |
          # Same as the Linux job: build BDB 4.8 from source with ALL the fixes the
          # project's `depends` system applies (see the Linux job for details).
          # Homebrew's berkeley-db@4 formula is deprecated / no longer reliable.
          BDB_SHA256="12edc0df75bf9abd7f82f821795bcee50f42cb2e5f76a6a281b85732798364ef"
          curl -fL -o db-4.8.30.NC.tar.gz http://download.oracle.com/berkeley-db/db-4.8.30.NC.tar.gz \
            || curl -fL -o db-4.8.30.NC.tar.gz https://bitcoincore.org/depends-sources/db-4.8.30.NC.tar.gz
          echo "${BDB_SHA256}  db-4.8.30.NC.tar.gz" | shasum -a 256 -c -
          tar -xzf db-4.8.30.NC.tar.gz
          cd db-4.8.30.NC
          sed -i.old 's/__atomic_compare_exchange/__atomic_compare_exchange_db/' dbinc/atomic.h
          sed -i.old 's/atomic_init/atomic_init_db/' dbinc/atomic.h mp/mp_region.c mp/mp_mvcc.c mp/mp_fget.c mutex/mut_method.c mutex/mut_tas.c
          cp -f ../depends/config.guess ../depends/config.sub dist/
          cd build_unix
          # --with-mutex=POSIX/pthreads: modern Xcode clang treats old-C implicit
          #   function declarations as hard errors, so ALL of BDB's assembly-mutex
          #   configure probes fail. Forcing pthread mutexes skips those probes and
          #   avoids 32-bit ARM assembly that would not build on Apple Silicon.
          # CFLAGS -std=gnu89 applies the C standard of this 2010-era C code so
          #   pre-C99 constructs stay warnings instead of errors under modern clang.
          # CXXFLAGS is set EXPLICITLY because BDB's build otherwise reuses CFLAGS
          #   for its C++ wrapper files, and -std=gnu89 is invalid for C++.
          ../dist/configure --enable-cxx --disable-shared --with-pic \
            --with-mutex=POSIX/pthreads \
            CFLAGS="-std=gnu89 -Wno-implicit-function-declaration" \
            CXXFLAGS="-O2" \
            --prefix=/usr/local/bdb4.8
          make -j$(sysctl -n hw.ncpu)
          sudo make install

      - name: Build macOS (daemon, CLI and GUI)
        run: |
          # qt@5 and protobuf@21 are keg-only: expose them explicitly.
          # ALSO: clang on Apple Silicon does NOT search /opt/homebrew/include or
          # /opt/homebrew/lib by default, so every brew package (zmq, libevent,
          # openssl, qrencode, ...) must be added to the paths explicitly --
          # otherwise compilation fails with e.g. "zmq.h file not found" even
          # though configure's pkg-config checks passed.
          BREW_PREFIX="$(brew --prefix)"
          QT5_PREFIX="$(brew --prefix qt@5)"
          PB21_PREFIX="$(brew --prefix protobuf@21)"
          export PATH="${QT5_PREFIX}/bin:${PB21_PREFIX}/bin:$PATH"
          export PKG_CONFIG_PATH="${QT5_PREFIX}/lib/pkgconfig:${PB21_PREFIX}/lib/pkgconfig:$PKG_CONFIG_PATH"
          ./autogen.sh
          ./configure \
            LDFLAGS="-L/usr/local/bdb4.8/lib -L${PB21_PREFIX}/lib -L${BREW_PREFIX}/lib" \
            CPPFLAGS="-I/usr/local/bdb4.8/include -I${PB21_PREFIX}/include -I${BREW_PREFIX}/include" \
            --with-boost=/usr/local/boost183 \
            --disable-tests --disable-bench --without-miniupnpc
          make -j$(sysctl -n hw.ncpu)

      - name: Package macOS binaries (tar.gz + DMG with bundled Qt)
        run: |
          ARCH=$(uname -m)
          OUT="krypton-${{ inputs.version }}-${ARCH}-apple-darwin"
          echo "OUT=$OUT" >> $GITHUB_ENV
          mkdir -p "$OUT"
          cp src/kryptond src/krypton-cli src/krypton-tx "$OUT"/
          cp src/qt/krypton-qt "$OUT"/
          cp README.md COPYING "$OUT"/
          tar -czf "${OUT}.tar.gz" "$OUT"

          # Build a double-clickable .app + .dmg. macdeployqt copies the Qt
          # frameworks INTO the app bundle so end users need nothing installed.
          QT5_PREFIX="$(brew --prefix qt@5)"
          APP="Krypton-Qt.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp src/qt/krypton-qt "$APP/Contents/MacOS/Krypton-Qt"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>Krypton-Qt</string>
            <key>CFBundleIdentifier</key><string>org.krypton.KryptonQt</string>
            <key>CFBundleName</key><string>Krypton-Qt</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${{ inputs.version }}</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          "${QT5_PREFIX}/bin/macdeployqt" "$APP" -dmg
          mv "Krypton-Qt.dmg" "krypton-${{ inputs.version }}-${ARCH}-apple-darwin-setup.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            ${{ env.OUT }}.tar.gz
            krypton-${{ inputs.version }}-*-apple-darwin-setup.dmg

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Display structure
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: Krypton v${{ inputs.version }}
          draft: false
          prerelease: false
          body: |
            ## Krypton v${{ inputs.version }}

            ### 🔧 What's new in this release

            **Consensus & security (mainnet changes activate at block 527040 — hard fork, all nodes and pools must upgrade before that height):**
            - **Faster difficulty adjustment**: the LWMA retarget window narrows from 120 to 60 blocks (~1h instead of ~2h) at block 527040, so difficulty tracks hashrate swings twice as fast.
            - **Deep-reorg (51%) protection**: nodes now reject any competing chain that would reorganize more than 200 blocks (~3h20) below their tip. Enforced at header level — attacking chains are refused before download, cannot stall the node, and peers on a legitimate old fork are not banned. Tunable/disable-able per node with `-maxreorgdepth=<n>`. Inactive during initial sync.
            - **Consensus hardening**: block subsidy is now computed with an exact integer constant instead of floating point (same value, guaranteed bit-identical on every platform/compiler).

            **Network:**
            - **P2P timings tuned for 60-second blocks**: stale-tip detection, extra-peer eviction and chain-sync timeout now scale from the real block interval instead of Bitcoin's inherited 10-minute assumptions — the network reacts ~10x faster to lagging or stalling peers.

            **Wallet & GUI:**
            - Full graphical wallet (`krypton-qt`) ships on all three platforms, including a Windows setup wizard and a macOS DMG with Qt bundled.
            - Wallet, transaction and fee logic fully reviewed: relay fee, dust threshold, default wallet fees, `-maxtxfee` safety cap and the fee estimator are all confirmed sound for Krypton's 60s chain.

            **Build & compatibility:**
            - Codebase now builds cleanly with modern toolchains (GCC 13, current Xcode/clang, current mingw-w64) and on Apple Silicon.
            - Reproducible cross-platform release pipeline (this release was built entirely by CI from source).

            ### 📦 Downloads

            **Windows:**
            - `krypton-${{ inputs.version }}-win64-setup.exe` — **installer wizard** (recommended): choose install folder, Start Menu shortcuts, uninstaller
            - `krypton-${{ inputs.version }}-win64.zip` — portable version, no installation needed

            **Linux:**
            - `krypton-${{ inputs.version }}-x86_64-linux-gnu.tar.gz` — GUI wallet (`krypton-qt`), node daemon and CLI tools
              (GUI requires Qt 5 runtime: `sudo apt install libqt5widgets5 libqt5network5 libqt5dbus5`)

            **macOS (Apple Silicon):**
            - `krypton-${{ inputs.version }}-*-apple-darwin-setup.dmg` — double-clickable app with Qt bundled
            - `krypton-${{ inputs.version }}-*-apple-darwin.tar.gz` — command-line binaries

            ### 🚀 Installation

            **Windows:** run the setup.exe and follow the wizard, or extract the ZIP and run `krypton-qt.exe`
            **Linux:** extract and run `./krypton-qt`
            **macOS:** mount the DMG and drag Krypton-Qt to Applications

            Advanced users can run the headless node with `kryptond -daemon` and manage
            the wallet with `krypton-cli` (`getnewaddress`, `sendtoaddress`, `getbalance`, ...).

            ### ⚠️ Upgrade notice

            The new difficulty algorithm activates at **block 527040**. This is a hard fork:
            every node and mining pool must run v${{ inputs.version }} (or later) before that
            height, or it will be left on a dead chain.
          files: |
            krypton-${{ inputs.version }}-win64-setup.exe
            krypton-${{ inputs.version }}-win64.zip
            krypton-${{ inputs.version }}-x86_64-linux-gnu.tar.gz
            krypton-${{ inputs.version }}-*-apple-darwin-setup.dmg
            krypton-${{ inputs.version }}-*-apple-darwin.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
