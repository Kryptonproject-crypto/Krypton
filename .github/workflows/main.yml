name: Krypton Release Builder

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.6.0)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: true

# Required so the create-release job (softprops/action-gh-release) is allowed to
# publish a release. Without this, GITHUB_TOKEN defaults to read-only on many repos
# and release creation fails with a 403 permission error.
permissions:
  contents: write

jobs:
  build-windows:
    # Cross-compiled FROM Linux using the project's own `depends` system + mingw-w64.
    # This is the standard, well-tested approach for Bitcoin/Litecoin-derived codebases,
    # and `depends` already contains every patch Berkeley DB 4.8 needs to build with
    # modern toolchains.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils curl git ca-certificates python3 \
            g++-mingw-w64-x86-64 mingw-w64-x86-64-dev
          # Ubuntu's mingw-w64 defaults to the win32 threading model, which lacks
          # std::thread support that this codebase needs. Switch to posix threads.
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Build dependencies (depends system, includes Berkeley DB 4.8)
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 NO_QT=1 -j$(nproc)

      - name: Build Windows binaries
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
            --without-gui --disable-tests --disable-bench --prefix=/
          make -j$(nproc)

      - name: Package Windows binaries
        run: |
          OUT="krypton-${{ inputs.version }}-win64"
          mkdir -p "$OUT"
          cp src/kryptond.exe src/krypton-cli.exe src/krypton-tx.exe "$OUT"/
          cp README.md COPYING "$OUT"/
          zip -r "${OUT}.zip" "$OUT"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: krypton-${{ inputs.version }}-win64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake \
            pkg-config bsdmainutils curl git libboost-all-dev libssl-dev \
            libevent-dev libminiupnpc-dev libzmq3-dev libprotobuf-dev protobuf-compiler

      - name: Build Berkeley DB 4.8
        run: |
          # Ubuntu's own libdb++-dev package is v5.3+, which produces wallets that are
          # not guaranteed compatible with the 4.8 wallets built for Windows/macOS.
          # Build the exact version from source, replicating ALL the fixes that the
          # project's own `depends` system applies to this package (depends/packages/bdb.mk):
          #   1. download with a fallback mirror + checksum (download.oracle.com is
          #      notoriously unreliable for scripted/CI downloads)
          #   2. rename __atomic_compare_exchange/atomic_init, which collide with
          #      built-in functions of modern GCC/clang and break the build
          #   3. replace BDB's ancient bundled config.guess/config.sub (they misdetect
          #      modern platforms, e.g. "no mutex implementation" on recent macOS)
          BDB_SHA256="12edc0df75bf9abd7f82f821795bcee50f42cb2e5f76a6a281b85732798364ef"
          curl -fL -o db-4.8.30.NC.tar.gz http://download.oracle.com/berkeley-db/db-4.8.30.NC.tar.gz \
            || curl -fL -o db-4.8.30.NC.tar.gz https://bitcoincore.org/depends-sources/db-4.8.30.NC.tar.gz
          echo "${BDB_SHA256}  db-4.8.30.NC.tar.gz" | sha256sum -c -
          tar -xzf db-4.8.30.NC.tar.gz
          cd db-4.8.30.NC
          sed -i.old 's/__atomic_compare_exchange/__atomic_compare_exchange_db/' dbinc/atomic.h
          sed -i.old 's/atomic_init/atomic_init_db/' dbinc/atomic.h mp/mp_region.c mp/mp_mvcc.c mp/mp_fget.c mutex/mut_method.c mutex/mut_tas.c
          cp -f ../depends/config.guess ../depends/config.sub dist/
          cd build_unix
          ../dist/configure --enable-cxx --disable-shared --with-pic --prefix=/usr/local/bdb4.8
          make -j$(nproc)
          sudo make install

      - name: Build Linux 64-bit
        run: |
          ./autogen.sh
          ./configure LDFLAGS="-L/usr/local/bdb4.8/lib" CPPFLAGS="-I/usr/local/bdb4.8/include" \
            --without-gui --disable-tests --disable-bench --without-miniupnpc
          make -j$(nproc)

      - name: Package Linux binaries
        run: |
          OUT="krypton-${{ inputs.version }}-x86_64-linux-gnu"
          mkdir -p "$OUT"
          cp src/kryptond src/krypton-cli src/krypton-tx "$OUT"/
          cp README.md COPYING "$OUT"/
          tar -czf "${OUT}.tar.gz" "$OUT"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: krypton-${{ inputs.version }}-x86_64-linux-gnu.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          # GitHub's macOS runners ship with extra pre-installed Homebrew taps
          # (e.g. aws/tap) that Homebrew's new tap-trust policy refuses, which can
          # make any `brew` command fail. Untap them: we only need core formulae.
          brew untap aws/tap 2>/dev/null || true
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install automake libtool boost miniupnpc openssl@3 pkg-config zmq libevent

      - name: Build Berkeley DB 4.8
        run: |
          # Same as the Linux job: build BDB 4.8 from source with ALL the fixes the
          # project's `depends` system applies (see the Linux job for details).
          # Homebrew's berkeley-db@4 formula is deprecated / no longer reliable.
          BDB_SHA256="12edc0df75bf9abd7f82f821795bcee50f42cb2e5f76a6a281b85732798364ef"
          curl -fL -o db-4.8.30.NC.tar.gz http://download.oracle.com/berkeley-db/db-4.8.30.NC.tar.gz \
            || curl -fL -o db-4.8.30.NC.tar.gz https://bitcoincore.org/depends-sources/db-4.8.30.NC.tar.gz
          echo "${BDB_SHA256}  db-4.8.30.NC.tar.gz" | shasum -a 256 -c -
          tar -xzf db-4.8.30.NC.tar.gz
          cd db-4.8.30.NC
          sed -i.old 's/__atomic_compare_exchange/__atomic_compare_exchange_db/' dbinc/atomic.h
          sed -i.old 's/atomic_init/atomic_init_db/' dbinc/atomic.h mp/mp_region.c mp/mp_mvcc.c mp/mp_fget.c mutex/mut_method.c mutex/mut_tas.c
          cp -f ../depends/config.guess ../depends/config.sub dist/
          cd build_unix
          ../dist/configure --enable-cxx --disable-shared --with-pic --prefix=/usr/local/bdb4.8
          make -j$(sysctl -n hw.ncpu)
          sudo make install

      - name: Build macOS
        run: |
          ./autogen.sh
          ./configure LDFLAGS="-L/usr/local/bdb4.8/lib" CPPFLAGS="-I/usr/local/bdb4.8/include" \
            --without-gui --disable-tests --disable-bench
          make -j$(sysctl -n hw.ncpu)

      - name: Package macOS binaries
        run: |
          # macos-latest runners are Apple Silicon (arm64); label the archive with the
          # actual architecture instead of hardcoding x86_64.
          ARCH=$(uname -m)
          OUT="krypton-${{ inputs.version }}-${ARCH}-apple-darwin"
          echo "OUT=$OUT" >> $GITHUB_ENV
          mkdir -p "$OUT"
          cp src/kryptond src/krypton-cli src/krypton-tx "$OUT"/
          cp README.md COPYING "$OUT"/
          tar -czf "${OUT}.tar.gz" "$OUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: ${{ env.OUT }}.tar.gz

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Display structure
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: Krypton v${{ inputs.version }}
          draft: false
          prerelease: false
          body: |
            ## Krypton v${{ inputs.version }}

            ### Downloads

            - `krypton-${{ inputs.version }}-win64.zip` — Windows 64-bit
            - `krypton-${{ inputs.version }}-x86_64-linux-gnu.tar.gz` — Linux 64-bit
            - `krypton-${{ inputs.version }}-*-apple-darwin.tar.gz` — macOS

            Each archive contains the node daemon and the wallet CLI (`kryptond`,
            `krypton-cli`, `krypton-tx`) — no graphical window. Start the node with
            `kryptond -daemon`, then manage your wallet with `krypton-cli`
            (`getnewaddress`, `sendtoaddress`, `getbalance`, etc.).

            ### Verify your download
            Run `./kryptond --version` — it should report v${{ inputs.version }}.
          files: |
            krypton-${{ inputs.version }}-win64.zip
            krypton-${{ inputs.version }}-x86_64-linux-gnu.tar.gz
            krypton-${{ inputs.version }}-*-apple-darwin.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
